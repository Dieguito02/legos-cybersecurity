<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NTT DATA · OT Red Team · Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700&family=Noto+Serif:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/theme.css">
<style>
  body {
    background: #0D1117;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Sans', sans-serif;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      linear-gradient(rgba(111,179,224,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(111,179,224,0.035) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse at center, #000 40%, transparent 90%);
  }
  .login-card {
    position: relative;
    z-index: 1;
    background: rgba(28,35,47,0.92);
    border: 1px solid #2A313D;
    border-radius: 16px;
    padding: 2.5rem 2.5rem 2rem;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .login-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #0072BC, #3FB4EA, #0072BC);
    border-radius: 16px 16px 0 0;
  }
  .brand-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1.75rem;
  }
  .brand-logo .sep {
    width: 1px;
    height: 28px;
    background: #3A4252;
  }
  .brand-logo .tag {
    font-family: ui-monospace, Consolas, monospace;
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #4A8FC7;
  }
  .brand-logo .tag strong { color: #E8473A; }
  h2 {
    font-family: 'Noto Serif', Georgia, serif;
    font-weight: 700;
    font-size: 1.5rem;
    color: #F5F7FA;
    margin-bottom: 0.25rem;
  }
  .sub {
    font-family: ui-monospace, Consolas, monospace;
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #4A8FC7;
    margin-bottom: 1.75rem;
  }
  .form-label {
    color: #C4C9D0;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 0.35rem;
  }
  .form-control {
    background: rgba(13,17,23,0.8);
    border: 1px solid #2A313D;
    color: #E6E8EB;
    border-radius: 8px;
    padding: 0.65rem 0.9rem;
    font-size: 0.95rem;
    transition: border-color .2s, box-shadow .2s;
  }
  .form-control:focus {
    background: rgba(13,17,23,0.9);
    border-color: #0072BC;
    box-shadow: 0 0 0 3px rgba(0,114,188,0.18);
    color: #F5F7FA;
  }
  .form-control::placeholder { color: #7A8190; }
  .btn-primary-custom {
    background: #0072BC;
    border: none;
    color: #fff;
    padding: 0.7rem;
    border-radius: 8px;
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: background .2s, box-shadow .2s;
    width: 100%;
  }
  .btn-primary-custom:hover:not(:disabled) {
    background: #005B96;
    box-shadow: 0 4px 16px rgba(0,114,188,0.35);
  }
  .btn-primary-custom:disabled { opacity: 0.6; cursor: not-allowed; }
  #errorMsg {
    background: rgba(163,52,42,0.12);
    border: 1px solid rgba(163,52,42,0.4);
    border-radius: 8px;
    color: #D08076;
    font-size: 0.875rem;
    padding: 0.65rem 0.9rem;
    display: none;
  }
  .spinner-border-sm { width: 1rem; height: 1rem; border-width: 0.15em; }
</style>
</head>
<body>
<div class="login-card">
  <div class="brand-logo">
    <span class="tag">Seguridad Ofensiva <strong>·</strong> Training Factory 4.0</span>
  </div>
  <h2>Iniciar sesión</h2>
  <div class="sub">OT Red Team · Showroom Live Demo</div>

  <div id="errorMsg" role="alert"></div>

  <form id="loginForm" novalidate>
    <div class="mb-3">
      <label for="username" class="form-label">Usuario</label>
      <input type="text" id="username" name="username" class="form-control"
             placeholder="Ingrese su usuario" autocomplete="username" required>
    </div>
    <div class="mb-4">
      <label for="password" class="form-label">Contraseña</label>
      <input type="password" id="password" name="password" class="form-control"
             placeholder="Ingrese su contraseña" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-primary-custom" id="submitBtn">
      <span id="btnText">Iniciar sesión</span>
      <span id="btnSpinner" class="spinner-border spinner-border-sm ms-2" style="display:none;" role="status"></span>
    </button>
  </form>
</div>

<script>
  const form    = document.getElementById('loginForm');
  const errBox  = document.getElementById('errorMsg');
  const btnText = document.getElementById('btnText');
  const spinner = document.getElementById('btnSpinner');
  const btn     = document.getElementById('submitBtn');

  function showError(msg) {
    errBox.textContent = msg;
    errBox.style.display = 'block';
  }
  function hideError() { errBox.style.display = 'none'; }
  function setLoading(v) {
    btn.disabled = v;
    spinner.style.display = v ? 'inline-block' : 'none';
    btnText.textContent = v ? 'Verificando…' : 'Iniciar sesión';
  }

  form.addEventListener('submit', async e => {
    e.preventDefault();
    hideError();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !password) {
      showError('Por favor, complete todos los campos.');
      return;
    }
    setLoading(true);
    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (res.ok && data.ok) {
        window.location.href = '/dashboard';
      } else {
        showError(data.message || 'Credenciales inválidas. Intente nuevamente.');
      }
    } catch (err) {
      showError('Error de red. Verifique la conexión con el servidor.');
    } finally {
      setLoading(false);
    }
  });
</script>
</body>
</html>
